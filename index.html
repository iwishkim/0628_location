<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 발자국</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <header class="hero">
      <div>
        <p class="eyebrow">오늘의 이동기록</p>
        <h1>오늘의 발자국</h1>
        <p class="desc">내가 오늘 어디를 다녔는지 시간과 위치로 기록합니다.</p>
      </div>
      <div id="statusBadge" class="badge waiting">대기 중</div>
    </header>

    <section class="notice">
      위치 권한을 허용하면 현재 위치를 기록할 수 있습니다.<br>
      기록은 이 기기 브라우저에만 저장됩니다.
    </section>

    <section class="controls">
      <button id="startBtn" class="primary">기록 시작</button>
      <button id="stopBtn" class="danger">기록 정지</button>
      <button id="recordBtn" class="secondary">현재 위치 기록</button>
    </section>

    <section class="summary">
      <div class="summary-card">
        <span>오늘 기록</span>
        <strong id="countText">0개</strong>
      </div>
      <div class="summary-card">
        <span>마지막 기록</span>
        <strong id="lastTimeText">없음</strong>
      </div>
    </section>

    <section class="card">
      <h2>현재 위치</h2>
      <div id="currentLocation" class="empty">
        아직 위치 기록이 없습니다.
      </div>
    </section>

    <section class="card">
      <h2>장소 메모</h2>
      <textarea id="memoInput" placeholder="예: 분위기 좋은 골목, 다시 와볼 장소"></textarea>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>이동 타임라인</h2>
        <button id="clearBtn" class="text-btn">전체 삭제</button>
      </div>
      <div id="timeline" class="timeline"></div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
